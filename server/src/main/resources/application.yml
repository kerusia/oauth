spring:
  application:
    name: oauth
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    username: oauth-app
    password: oauth-app
    url: jdbc:mariadb://localhost:3306/oauth_db?useSSL=false
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQL8Dialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show-sql: true
  config:
    import: classpath:application-jwt.yml
