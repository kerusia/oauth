services:
  db:
    image: mariadb:12
    container_name: oauth-mariadb
    user: "1103:1103"
    ports:
      - "3306:3306"
    volumes:
      - ../../data/mariadb:/var/lib/mysql
    tmpfs:
      - /run/mariadb:uid=1103,gid=1103,mode=777
      - /var/run/mysqld:uid=1103,gid=1103,mode=777
    environment:
      - MARIADB_ROOT_PASSWORD=admin123!
      - MARIADB_DATABASE=oauth_db
      - MARIADB_USER=oauth-app
      - MARIADB_PASSWORD=oauth-app
    networks:
      - oauth-network
  nodejs:
    image: node:26
    container_name: oauth-nodejs
    user: "1000:1000"
    ports:
      - "3000:3000"
    working_dir: /app
    tty: true
    stdin_open: true
    volumes:
      - ../../client:/app
      - oauth_node_modules:/app/node_modules
    networks:
      - oauth-network
    #command: sleep infinity
    command: >
      sh -c "npm run dev -- --host --port 3000"
volumes:
  oauth_node_modules:
networks:
  oauth-network:
    driver: bridge
